steps:
  # ── Step 1: Run tests ────────────────────────────────────────────────────────
  - name: "python:3.11-slim"
    id: "run-tests"
    entrypoint: bash
    args:
      - -c
      - |
        pip install --quiet -r requirements.txt
        python -m pytest tests/ -v --tb=short --exitfirst \
          --ignore=tests/test_integration.py
    env:
      - "USE_SECRET_MANAGER=false"
      - "GCP_PROJECT_ID=$PROJECT_ID"

  # ── Step 2: Build Docker image ───────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "build-image"
    args:
      - build
      - -t
      - "gcr.io/$PROJECT_ID/aire-backend:$COMMIT_SHA"
      - -t
      - "gcr.io/$PROJECT_ID/aire-backend:latest"
      - -f
      - services/Dockerfile
      - .
    waitFor:
      - "run-tests"

  # ── Step 3: Push image to Artifact Registry ──────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "push-image"
    args:
      - push
      - --all-tags
      - "gcr.io/$PROJECT_ID/aire-backend"
    waitFor:
      - "build-image"

  # ── Step 4: Deploy to Cloud Run ──────────────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-cloud-run"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - aire-backend
      - --image=gcr.io/$PROJECT_ID/aire-backend:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --service-account=aire-backend@$PROJECT_ID.iam.gserviceaccount.com
      - --set-env-vars=GCP_PROJECT_ID=$PROJECT_ID,USE_SECRET_MANAGER=true,GCP_REGION=us-central1
      - --memory=1Gi
      - --cpu=1
      - --min-instances=1
      - --max-instances=10
      - --concurrency=80
      - --timeout=300
    waitFor:
      - "push-image"

  # ── Step 5: Ingest knowledge base docs ───────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "ingest-docs"
    entrypoint: bash
    args:
      - -c
      - |
        pip install --quiet -r requirements.txt
        python -c "
        from knowledge.rag_pipeline import get_pipeline
        pipeline = get_pipeline()
        names = pipeline.ingest_all_documents()
        print(f'Ingested {len(names)} documents')
        "
    env:
      - "GCP_PROJECT_ID=$PROJECT_ID"
      - "USE_SECRET_MANAGER=true"
    waitFor:
      - "deploy-cloud-run"

# ── Substitutions ────────────────────────────────────────────────────────────
substitutions:
  _REGION: us-central1

# ── Build options ────────────────────────────────────────────────────────────
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

# ── Trigger on main branch ───────────────────────────────────────────────────
timeout: "1200s"

images:
  - "gcr.io/$PROJECT_ID/aire-backend:$COMMIT_SHA"
  - "gcr.io/$PROJECT_ID/aire-backend:latest"
